# ================================================================================
# AI CHATBOT ? application.properties
# ALL configuration for the entire application lives in this ONE file.
# Edit this file to change AI provider, tokens, payments, scheduler, etc.
# ================================================================================


# ================================================================================
# SERVER
# ================================================================================
server.port=8090


# ================================================================================
# CORS ? allow React frontend to call the backend
# ================================================================================
spring.web.cors.allowed-origins=http://localhost:3000


# ================================================================================
# EXCEL FILE PATHS
# Paths are relative to the backend/ folder.
# Do NOT change unless you move the /data folder somewhere else.
# ================================================================================
excel.users.path=../data/users.xlsx
excel.transactions.path=../data/transactions.xlsx
excel.chats.path=../data/chats.xlsx


# ================================================================================
# JWT (Login tokens ? NOT chat tokens)
# ================================================================================
# Secret key used to sign JWTs. Change this to any long random string in production.
jwt.secret=chatbot-super-secret-key-change-this-in-production-min-32-chars

# How long a login session lasts in milliseconds.
# 86400000 = 24 hours   |   3600000 = 1 hour   |   604800000 = 7 days
jwt.expiration.ms=86400000


# ================================================================================
# TOKEN SYSTEM (chat credits)
# ================================================================================
# How many free tokens a brand-new user gets on registration.
tokens.default.count=10

# How many tokens are deducted per message sent.
tokens.cost.per.message=1

# After how many hours the scheduler resets a user's tokens back to the reset amount.
# Examples: 1 = every hour | 12 = twice a day | 24 = once a day | 168 = weekly
tokens.reset.interval.hours=24

# How many tokens are given to users when the scheduler resets them.
# This is the "free daily allowance". Set to the same as tokens.default.count or different.
tokens.reset.amount=10


# ================================================================================
# AI PROVIDER ? OLLAMA (local, free, no API key needed)
# ================================================================================
# This app uses Ollama by default ? a free, fully local AI that runs on your machine.
# No internet required for AI once the model is downloaded.
#
# HOW TO SET UP OLLAMA:
#   1. Install Ollama from https://ollama.ai
#   2. Run in terminal:  ollama serve
#   3. Pull a model:     ollama pull llama3.2
#   4. That's it ? no API key needed!
#
# See API_KEYS_GUIDE.txt for full setup instructions.
# ================================================================================
ai.provider=ollama
ai.api.url=http://localhost:11434/v1/chat/completions
ai.api.key=
ai.model=llama3.2

# ---- OTHER AI OPTIONS (uncomment ONE block to switch) ----

# OpenAI (paid, cloud):
# ai.provider=openai
# ai.api.url=https://api.openai.com/v1/chat/completions
# ai.api.key=sk-your-openai-key-here
# ai.model=gpt-4o-mini

# Groq (free tier, very fast cloud inference):
# ai.provider=openai
# ai.api.url=https://api.groq.com/openai/v1/chat/completions
# ai.api.key=gsk_your-groq-key-here
# ai.model=llama3-8b-8192

# LM Studio (local, free, GUI):
# ai.provider=ollama
# ai.api.url=http://localhost:1234/v1/chat/completions
# ai.api.key=lm-studio
# ai.model=<model-name-from-lm-studio>


# ================================================================================
# RAZORPAY PAYMENT CONFIGURATION (Test Mode)
# ================================================================================
# Get your test keys from https://dashboard.razorpay.com ? Settings ? API Keys
# Make sure TEST MODE is ON before generating keys.
# See API_KEYS_GUIDE.txt for step-by-step instructions.
# ================================================================================
razorpay.key.id=rzp_test_XXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXX


# ================================================================================
# TOKEN PACKAGES
# ================================================================================
# Define every package here. Add, remove, or reorder packages freely.
# The frontend reads these from the backend ? no frontend code changes needed ever.
#
# For each package [N] (N starts at 0), set:
#   payment.packages[N].amount      ? price in rupees (what the user pays)
#   payment.packages[N].label       ? display label shown in the UI  (e.g. Rs.10)
#   payment.packages[N].baseTokens  ? tokens given at normal (non-sale) price
#   payment.packages[N].popular     ? true shows a "Popular" badge on the card
#
# TO ADD A PACKAGE:
#   Copy any block below, increment N by 1, fill in your values. Restart backend.
# TO REMOVE A PACKAGE:
#   Delete its 4 lines. The remaining packages still work fine.
# TO REORDER:
#   Change the [N] numbers. Keep them 0-based and consecutive.
# ================================================================================
payment.packages[0].amount=10
payment.packages[0].label=Rs.10
payment.packages[0].baseTokens=100
payment.packages[0].popular=false

payment.packages[1].amount=25
payment.packages[1].label=Rs.25
payment.packages[1].baseTokens=250
payment.packages[1].popular=true

payment.packages[2].amount=50
payment.packages[2].label=Rs.50
payment.packages[2].baseTokens=500
payment.packages[2].popular=false

# ---- Uncomment and fill to add more packages ----
# payment.packages[3].amount=100
# payment.packages[3].label=Rs.100
# payment.packages[3].baseTokens=1100
# payment.packages[3].popular=false

# payment.packages[4].amount=200
# payment.packages[4].label=Rs.200
# payment.packages[4].baseTokens=2400
# payment.packages[4].popular=false


# ================================================================================
# DISCOUNT / SALE CONFIGURATION
# ================================================================================
# These let you run sales and give bonus tokens without touching any code.
# The price shown to users stays the SAME ? they just get MORE tokens.
# See CONFIGURATION_GUIDE.txt -> Section 2.5 for full explanation.
# ================================================================================

# Master switch: set to true to activate the sale, false to disable it.
# When false, ALL discount settings below are completely ignored.
payment.discount.enabled=false

# Sale label shown to users in the UI (e.g., "Diwali Sale", "Weekend Offer").
# Keep it short ? it appears as a badge on each package card.
payment.discount.label=Sale

# Global bonus percentage added on top of each package's baseTokens.
# Example: 20 means every package gives 20% extra tokens for free.
# Set to 0 if you only want per-package bonuses (see below).
payment.discount.global-bonus-percent=20

# Per-package EXTRA bonus tokens ? indexed to match payment.packages[N] above.
# Added on top of the global bonus. Set to 0 for no extra on that package.
# When you add a new package above, add a matching line here.
payment.discount.packageExtras[0].extra=0
payment.discount.packageExtras[1].extra=50
payment.discount.packageExtras[2].extra=150
# payment.discount.packageExtras[3].extra=300
# payment.discount.packageExtras[4].extra=700


# ================================================================================
# SCHEDULER ? automatic token reset job
# ================================================================================
# Cron expression for how often the scheduler CHECKS if users need a token reset.
# Default: runs every hour.  The actual reset only happens if the user's
# last_reset_time is older than tokens.reset.interval.hours (set above).
#
# Cron format:  second  minute  hour  day  month  weekday
# Every hour:   0 0 * * * *
# Every minute: 0 * * * * *    (useful for testing ? change back after!)
# Every day at midnight: 0 0 0 * * *
scheduler.token.reset.cron=0 0 * * * *
